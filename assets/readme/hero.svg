<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="420" viewBox="0 0 1200 420" role="img" aria-labelledby="zyb-title zyb-desc">
  <title id="zyb-title">作业帮错题本处理套件</title>
  <desc id="zyb-desc">首屏展示两个 Python Skill 的工作流：从作业帮 PDF 生成讲义，再按题号切分为独立错题图片。</desc>

  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="16" flood-color="#000000" flood-opacity="0.06"/>
    </filter>
    <linearGradient id="blue-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#60a5fa"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
    <linearGradient id="green-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#34d399"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="420" rx="28" fill="#f0f9ff"/>

  <!-- Title -->
  <g transform="translate(64, 96)">
    <text x="0" y="0" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13" font-weight="500" fill="#60a5fa" letter-spacing="0.1em">PYTHON SKILL SUITE</text>
    <text x="0" y="64" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, PingFang SC, Microsoft YaHei, sans-serif" font-size="48" font-weight="780" fill="#0c4a6e" letter-spacing="-0.03em">作业帮错题本</text>
    <text x="0" y="116" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, PingFang SC, Microsoft YaHei, sans-serif" font-size="48" font-weight="780" fill="#0c4a6e" letter-spacing="-0.03em">处理套件</text>
    <text x="0" y="160" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, PingFang SC, Microsoft YaHei, sans-serif" font-size="18" font-weight="430" fill="#0369a1">PDF → 个性化讲义 → 独立错题图片</text>
  </g>

  <!-- Pipeline -->
  <g transform="translate(560, 84)" filter="url(#shadow)">
    <!-- Input PDF -->
    <g transform="translate(0, 40)">
      <rect x="0" y="0" width="120" height="160" rx="12" fill="#ffffff" stroke="#bfdbfe" stroke-width="1"/>
      <rect x="0" y="0" width="120" height="28" rx="12" fill="#dbeafe"/>
      <text x="60" y="18" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="11" font-weight="700" fill="#1e40af">作业帮 PDF</text>
      <rect x="16" y="44" width="88" height="8" rx="4" fill="#eff6ff"/>
      <rect x="16" y="60" width="72" height="8" rx="4" fill="#eff6ff"/>
      <rect x="16" y="76" width="80" height="8" rx="4" fill="#eff6ff"/>
      <rect x="16" y="100" width="88" height="8" rx="4" fill="#eff6ff"/>
      <rect x="16" y="116" width="64" height="8" rx="4" fill="#eff6ff"/>
    </g>

    <!-- Arrow -->
    <g transform="translate(130, 110)">
      <line x1="0" y1="10" x2="40" y2="10" stroke="#93c5fd" stroke-width="2" stroke-linecap="round"/>
      <path d="M34 4l6 6-6 6" stroke="#93c5fd" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    </g>

    <!-- Skill 1 -->
    <g transform="translate(190, 20)">
      <rect x="0" y="0" width="160" height="200" rx="18" fill="#ffffff" stroke="#bfdbfe" stroke-width="1"/>
      <rect x="0" y="0" width="160" height="6" rx="3" fill="url(#blue-grad)"/>
      <circle cx="80" cy="50" r="24" fill="#dbeafe"/>
      <text x="80" y="56" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13" font-weight="700" fill="#1d4ed8">PDF</text>
      <text x="80" y="94" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="13" font-weight="700" fill="#0c4a6e">讲义生成</text>
      <rect x="20" y="120" width="120" height="8" rx="4" fill="#eff6ff"/>
      <rect x="20" y="140" width="90" height="8" rx="4" fill="#eff6ff"/>
      <rect x="20" y="160" width="110" height="8" rx="4" fill="#eff6ff"/>
    </g>

    <!-- Arrow -->
    <g transform="translate(360, 110)">
      <line x1="0" y1="10" x2="40" y2="10" stroke="#93c5fd" stroke-width="2" stroke-linecap="round"/>
      <path d="M34 4l6 6-6 6" stroke="#93c5fd" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    </g>

    <!-- Skill 2 -->
    <g transform="translate(420, 20)">
      <rect x="0" y="0" width="160" height="200" rx="18" fill="#ffffff" stroke="#bbf7d0" stroke-width="1"/>
      <rect x="0" y="0" width="160" height="6" rx="3" fill="url(#green-grad)"/>
      <circle cx="80" cy="50" r="24" fill="#d1fae5"/>
      <text x="80" y="56" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13" font-weight="700" fill="#047857">PNG</text>
      <text x="80" y="94" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="13" font-weight="700" fill="#0c4a6e">题目切分</text>
      <rect x="20" y="120" width="120" height="8" rx="4" fill="#f0fdf4"/>
      <rect x="20" y="140" width="90" height="8" rx="4" fill="#f0fdf4"/>
      <rect x="20" y="160" width="110" height="8" rx="4" fill="#f0fdf4"/>
    </g>

    <!-- Arrow -->
    <g transform="translate(590, 110)">
      <line x1="0" y1="10" x2="40" y2="10" stroke="#6ee7b7" stroke-width="2" stroke-linecap="round"/>
      <path d="M34 4l6 6-6 6" stroke="#6ee7b7" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    </g>

    <!-- Output images -->
    <g transform="translate(660, 40)">
      <rect x="0" y="0" width="120" height="160" rx="12" fill="#ffffff" stroke="#bbf7d0" stroke-width="1"/>
      <rect x="0" y="0" width="120" height="28" rx="12" fill="#dcfce7"/>
      <text x="60" y="18" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="11" font-weight="700" fill="#166534">错题图片</text>
      <rect x="16" y="44" width="88" height="28" rx="4" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1"/>
      <text x="60" y="62" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="10" fill="#15803d">题目_01</text>
      <rect x="16" y="80" width="88" height="28" rx="4" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1"/>
      <text x="60" y="98" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="10" fill="#15803d">题目_02</text>
      <rect x="16" y="116" width="88" height="28" rx="4" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1"/>
      <text x="60" y="134" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="10" fill="#15803d">题目_03</text>
    </g>
  </g>
</svg>
