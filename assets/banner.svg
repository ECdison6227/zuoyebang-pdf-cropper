<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="640" viewBox="0 0 1280 640">
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#e5e7eb" stroke-width="1"/>
    </pattern>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#000000" flood-opacity="0.08"/>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#6b7280"/>
    </marker>
  </defs>

  <!-- background -->
  <rect width="1280" height="640" fill="#f9fafb"/>
  <rect width="1280" height="640" fill="url(#grid)"/>

  <!-- title -->
  <text x="640" y="85" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="48" font-weight="700" fill="#111827">作业帮错题处理套件</text>
  <text x="640" y="125" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="20" fill="#6b7280">处理错题本 PDF → 生成讲义 → 切分为独立题目图片</text>

  <!-- input node -->
  <g transform="translate(60, 200)" filter="url(#shadow)">
    <rect width="220" height="90" rx="8" fill="#ffffff" stroke="#6366f1" stroke-width="2"/>
    <rect x="0" y="0" width="220" height="6" rx="4" fill="#6366f1"/>
    <text x="110" y="40" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="18" font-weight="700" fill="#1f2937">作业帮 App</text>
    <text x="110" y="65" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="13" fill="#6b7280">导出错题本 PDF</text>
  </g>

  <!-- skill 1 -->
  <g transform="translate(360, 190)" filter="url(#shadow)">
    <rect width="260" height="110" rx="8" fill="#ffffff" stroke="#3b82f6" stroke-width="2"/>
    <rect x="0" y="0" width="260" height="6" rx="4" fill="#3b82f6"/>
    <text x="130" y="42" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="17" font-weight="700" fill="#1f2937">mistake-notebook-processor</text>
    <text x="130" y="68" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="13" fill="#6b7280">去品牌 · 加封面 · 生成讲义</text>
  </g>

  <!-- handout pdf -->
  <g transform="translate(700, 200)" filter="url(#shadow)">
    <rect width="180" height="90" rx="8" fill="#ffffff" stroke="#10b981" stroke-width="2"/>
    <rect x="0" y="0" width="180" height="6" rx="4" fill="#10b981"/>
    <text x="90" y="40" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="18" font-weight="700" fill="#1f2937">个性化讲义 PDF</text>
    <text x="90" y="65" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="13" fill="#6b7280">封面 + 页眉页脚</text>
  </g>

  <!-- skill 2 -->
  <g transform="translate(940, 190)" filter="url(#shadow)">
    <rect width="240" height="110" rx="8" fill="#ffffff" stroke="#f59e0b" stroke-width="2"/>
    <rect x="0" y="0" width="240" height="6" rx="4" fill="#f59e0b"/>
    <text x="120" y="42" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="17" font-weight="700" fill="#1f2937">pdf-question-cropper</text>
    <text x="120" y="68" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="13" fill="#6b7280">按题号切分 · 跨页合并</text>
  </g>

  <!-- arrows -->
  <line x1="280" y1="245" x2="360" y2="245" stroke="#6b7280" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="620" y1="245" x2="700" y2="245" stroke="#6b7280" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="880" y1="245" x2="940" y2="245" stroke="#6b7280" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- output row -->
  <g transform="translate(160, 410)" filter="url(#shadow)">
    <rect width="180" height="80" rx="8" fill="#ffffff" stroke="#8b5cf6" stroke-width="2"/>
    <rect x="0" y="0" width="180" height="6" rx="4" fill="#8b5cf6"/>
    <text x="90" y="38" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="16" font-weight="700" fill="#1f2937">题目图片</text>
    <text x="90" y="60" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="12" fill="#6b7280">第 1 题 · 第 2 题 · ...</text>
  </g>

  <g transform="translate(440, 410)" filter="url(#shadow)">
    <rect width="180" height="80" rx="8" fill="#ffffff" stroke="#8b5cf6" stroke-width="2"/>
    <rect x="0" y="0" width="180" height="6" rx="4" fill="#8b5cf6"/>
    <text x="90" y="38" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="16" font-weight="700" fill="#1f2937">裁剪报告</text>
    <text x="90" y="60" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="12" fill="#6b7280">题号 · 页码 · 知识点</text>
  </g>

  <g transform="translate(760, 410)" filter="url(#shadow)">
    <rect width="320" height="80" rx="8" fill="#ffffff" stroke="#ef4444" stroke-width="2" stroke-dasharray="6 4"/>
    <rect x="0" y="0" width="320" height="6" rx="4" fill="#ef4444"/>
    <text x="160" y="38" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="17" font-weight="700" fill="#1f2937">每个学生专属错题本</text>
    <text x="160" y="60" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="12" fill="#6b7280">只练不会的题</text>
  </g>

  <!-- arrows down: skill2 -> outputs -->
  <line x1="1060" y1="300" x2="1060" y2="360" stroke="#6b7280" stroke-width="2"/>
  <line x1="250" y1="360" x2="1060" y2="360" stroke="#6b7280" stroke-width="2"/>
  <line x1="250" y1="360" x2="250" y2="410" stroke="#6b7280" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="530" y1="360" x2="530" y2="410" stroke="#6b7280" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="920" y1="360" x2="920" y2="410" stroke="#6b7280" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- bottom labels -->
  <text x="640" y="600" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="14" fill="#9ca3af">for teachers and tutors using Zuoyebang</text>
</svg>
